# Клиентский конфиг: jitsi + vp8channel
# Запуск: olcrtc docs/examples/client/client.jitsi.vp8channel.yaml

mode: cnc

auth:
  provider: jitsi

# Для jitsi: полный URL комнаты (https://host/room или host/room).
# Должен совпадать с сервером.
# Доступные серверы: meet.small-dm.ru, meet1.arbitr.ru или meet.handyweb.org
# Проверьте в браузере, какой работает в вашей сети.
room:
  id: "https://meet.small-dm.ru/REPLACE_WITH_ROOM_NAME"

crypto:
  # Можно использовать key_file: "./olcrtc.key", чтобы не хранить секрет прямо здесь.
  key: "REPLACE_ME_WITH_64_HEX_CHARS" # должен совпадать с сервером

net:
  transport: vp8channel
  dns: "8.8.8.8:53"

liveness:
  interval: 10s
  timeout: 5s
  failures: 3

socks:
  host: "127.0.0.1"
  port: 8808
  user: "" # необязательная входящая auth
  pass: ""

vp8:
  fps: 30
  batch_size: 64

data: data
debug: false
